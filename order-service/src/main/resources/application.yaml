server:
  port: 8082

spring:
  application:
    name: order-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,threaddump,heapdump
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: order-service
    description: Order management service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
