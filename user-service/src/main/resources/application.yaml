server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/microservices_platform?currentSchema=user_service}
    username: ${SPRING_DATASOURCE_USERNAME:user_service_app}
    password: ${SPRING_DATASOURCE_PASSWORD:user_service_secret}
  security:
    user:
      name: ${ACTUATOR_USERNAME:actuator}
      password: ${ACTUATOR_PASSWORD:actuator-secret}

app:
  security:
    jwt-secret: ${JWT_SECRET:dev-jwt-secret-change-in-prod}
    gateway-secret: ${GATEWAY_SECRET:dev-secret}

management:
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: user-service
    description: User management service

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    metadata-map:
      user.name: ${spring.security.user.name}
      user.password: ${spring.security.user.password}
