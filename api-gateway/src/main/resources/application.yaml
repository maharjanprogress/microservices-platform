server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  security:
    user:
      name: ${ACTUATOR_USERNAME:actuator}
      password: ${ACTUATOR_PASSWORD:actuator-secret}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/orders/**
            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/payments/**
          discovery:
            locator:
              enabled: false
          metrics:
            enabled: true
            path-tags:
              enabled: true

app:
  security:
    jwt-secret: ${JWT_SECRET:dev-jwt-secret-change-in-prod}
    gateway-secret: ${GATEWAY_SECRET:dev-secret}

management:
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.cloud.gateway.requests: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: when_authorized
    gateway:
      access: read-only
  info:
    env:
      enabled: true

info:
  app:
    name: api-gateway
    description: API Gateway for microservices

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    metadata-map:
      user.name: ${spring.security.user.name}
      user.password: ${spring.security.user.password}
