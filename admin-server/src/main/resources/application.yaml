server:
  port: ${SERVER_PORT:9090}
  forward-headers-strategy: framework

spring:
  application:
    name: admin-server
  thymeleaf:
    check-template-location: false
  boot:
    admin:
      instance-auth:
        enabled: true
        default-user-name: ${ACTUATOR_USERNAME:actuator}
        default-password: ${ACTUATOR_PASSWORD:actuator-secret}

monitoring:
  security:
    admin-username: ${ADMIN_SERVER_USERNAME:admin}
    admin-password: ${ADMIN_SERVER_PASSWORD:admin-secret}
    actuator-username: ${ACTUATOR_USERNAME:actuator}
    actuator-password: ${ACTUATOR_PASSWORD:actuator-secret}

management:
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: admin-server
    description: Spring Boot Admin server

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    metadata-map:
      user.name: ${monitoring.security.actuator-username}
      user.password: ${monitoring.security.actuator-password}
