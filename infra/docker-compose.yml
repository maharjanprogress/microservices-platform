services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PLATFORM_DB_NAME: ${PLATFORM_DB_NAME:-microservices_platform}
      DB_ADMIN_USERNAME: ${DB_ADMIN_USERNAME:-platform_admin}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD:-platform_admin-secret}
      USER_DB_USERNAME: ${USER_DB_USERNAME:-user_service_app}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:-user_service_secret}
      ORDER_DB_USERNAME: ${ORDER_DB_USERNAME:-order_service_app}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:-order_service_secret}
      PAYMENT_DB_USERNAME: ${PAYMENT_DB_USERNAME:-payment_service_app}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment_service_secret}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - monitoring-net

  discovery-server:
    build:
      context: ../discovery-server
    container_name: discovery-server
    environment:
      SERVER_PORT: 8761
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
    ports:
      - "${DISCOVERY_SERVER_PORT}:8761"
    networks:
      - monitoring-net

  user-service:
    build:
      context: ../user-service
    container_name: user-service
    depends_on:
      discovery-server:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PLATFORM_DB_NAME:-microservices_platform}?currentSchema=user_service
      SPRING_DATASOURCE_USERNAME: ${USER_DB_USERNAME:-user_service_app}
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD:-user_service_secret}
    networks:
      - monitoring-net

  order-service:
    build:
      context: ../order-service
    container_name: order-service
    depends_on:
      discovery-server:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PLATFORM_DB_NAME:-microservices_platform}?currentSchema=order_service
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USERNAME:-order_service_app}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD:-order_service_secret}
    networks:
      - monitoring-net

  payment-service:
    build:
      context: ../payment-service
    container_name: payment-service
    depends_on:
      discovery-server:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PLATFORM_DB_NAME:-microservices_platform}?currentSchema=payment_service
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_USERNAME:-payment_service_app}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment_service_secret}
    networks:
      - monitoring-net

  api-gateway:
    build:
      context: ../api-gateway
    container_name: api-gateway
    depends_on:
      - discovery-server
      - user-service
      - order-service
      - payment-service
    environment:
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
    ports:
      - "${API_GATEWAY_PORT}:8080"
    networks:
      - monitoring-net

  admin-server:
    build:
      context: ../admin-server
    container_name: admin-server
    depends_on:
      discovery-server:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 9090
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
      ADMIN_SERVER_USERNAME: ${ADMIN_SERVER_USERNAME}
      ADMIN_SERVER_PASSWORD: ${ADMIN_SERVER_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PLATFORM_DB_NAME:-microservices_platform}
      SPRING_DATASOURCE_USERNAME: ${DB_ADMIN_USERNAME:-platform_admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_ADMIN_PASSWORD:-platform_admin-secret}
    ports:
      - "${ADMIN_SERVER_PORT}:9090"
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - api-gateway
      - user-service
      - order-service
      - payment-service
      - admin-server
    environment:
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
    entrypoint: [ "/bin/sh", "-c" ]   # ← override the entrypoint
    command:
      - |
        sed -e "s|__ACTUATOR_USERNAME__|$$ACTUATOR_USERNAME|g" \
            -e "s|__ACTUATOR_PASSWORD__|$$ACTUATOR_PASSWORD|g" \
            /etc/prometheus/prometheus.tpl.yml > /tmp/prometheus.yml && \
        exec /bin/prometheus \
            --config.file=/tmp/prometheus.yml \
            --storage.tsdb.path=/prometheus \
            --web.enable-lifecycle \
            --web.console.libraries=/usr/share/prometheus/console_libraries \
            --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.tpl.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
