services:
  discovery-server:
    build:
      context: ../discovery-server
    container_name: discovery-server
    environment:
      SERVER_PORT: 8761
    ports:
      - "${DISCOVERY_SERVER_PORT}:8761"
    networks:
      - monitoring-net

  user-service:
    build:
      context: ../user-service
    container_name: user-service
    depends_on:
      - discovery-server
    environment:
      SERVER_PORT: 8081
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
    ports:
      - "${USER_SERVICE_PORT}:8081"
    networks:
      - monitoring-net

  order-service:
    build:
      context: ../order-service
    container_name: order-service
    depends_on:
      - discovery-server
    environment:
      SERVER_PORT: 8082
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
    ports:
      - "${ORDER_SERVICE_PORT}:8082"
    networks:
      - monitoring-net

  payment-service:
    build:
      context: ../payment-service
    container_name: payment-service
    depends_on:
      - discovery-server
    environment:
      SERVER_PORT: 8083
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
    ports:
      - "${PAYMENT_SERVICE_PORT}:8083"
    networks:
      - monitoring-net

  api-gateway:
    build:
      context: ../api-gateway
    container_name: api-gateway
    depends_on:
      - discovery-server
      - user-service
      - order-service
      - payment-service
    environment:
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
    ports:
      - "${API_GATEWAY_PORT}:8080"
    networks:
      - monitoring-net

  admin-server:
    build:
      context: ../admin-server
    container_name: admin-server
    depends_on:
      - discovery-server
      - api-gateway
      - user-service
      - order-service
      - payment-service
    environment:
      SERVER_PORT: 9090
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
      ADMIN_SERVER_USERNAME: ${ADMIN_SERVER_USERNAME}
      ADMIN_SERVER_PASSWORD: ${ADMIN_SERVER_PASSWORD}
    ports:
      - "${ADMIN_SERVER_PORT}:9090"
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - api-gateway
      - user-service
      - order-service
      - payment-service
      - admin-server
    environment:
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD}
    entrypoint: [ "/bin/sh", "-c" ]   # ← override the entrypoint
    command:
      - |
        sed -e "s|__ACTUATOR_USERNAME__|$$ACTUATOR_USERNAME|g" \
            -e "s|__ACTUATOR_PASSWORD__|$$ACTUATOR_PASSWORD|g" \
            /etc/prometheus/prometheus.tpl.yml > /tmp/prometheus.yml && \
        exec /bin/prometheus \
            --config.file=/tmp/prometheus.yml \
            --storage.tsdb.path=/prometheus \
            --web.console.libraries=/usr/share/prometheus/console_libraries \
            --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.tpl.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
