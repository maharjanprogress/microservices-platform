global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: "/actuator/prometheus"
    basic_auth:
      username: "__ACTUATOR_USERNAME__"
      password: "__ACTUATOR_PASSWORD__"
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "user-service"
    metrics_path: "/actuator/prometheus"
    basic_auth:
      username: "__ACTUATOR_USERNAME__"
      password: "__ACTUATOR_PASSWORD__"
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: "order-service"
    metrics_path: "/actuator/prometheus"
    basic_auth:
      username: "__ACTUATOR_USERNAME__"
      password: "__ACTUATOR_PASSWORD__"
    static_configs:
      - targets: ["order-service:8082"]

  - job_name: "payment-service"
    metrics_path: "/actuator/prometheus"
    basic_auth:
      username: "__ACTUATOR_USERNAME__"
      password: "__ACTUATOR_PASSWORD__"
    static_configs:
      - targets: ["payment-service:8083"]

  - job_name: "admin-server"
    metrics_path: "/actuator/prometheus"
    basic_auth:
      username: "__ACTUATOR_USERNAME__"
      password: "__ACTUATOR_PASSWORD__"
    static_configs:
      - targets: ["admin-server:9090"]
